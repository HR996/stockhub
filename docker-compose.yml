services:
  postgres:
    image: postgres:15
    container_name: istock-postgres
    environment:
      POSTGRES_USER: istock
      POSTGRES_PASSWORD: istock
      POSTGRES_DB: istock
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U istock -d istock"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build: ./backend
    container_name: istock-backend
    env_file:
      - ./backend/.env
    environment:
      DATABASE_URL: postgresql+psycopg://istock:istock@postgres:5432/istock
      PRECONFIGURED_USERS: admin,alice,bob
      ADMIN_PASSWORD_HASH: ""
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    depends_on:
      postgres:
        condition: service_healthy
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]

  frontend:
    build: ./frontend
    container_name: istock-frontend
    environment:
      VITE_API_TARGET: http://backend:8000
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend

volumes:
  postgres_data:
